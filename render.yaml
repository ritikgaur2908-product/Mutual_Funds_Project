services:
  - type: web
    name: mutual-funds-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
