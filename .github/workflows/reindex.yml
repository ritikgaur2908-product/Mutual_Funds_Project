name: Daily Mutual Fund Re-indexing

on:
  schedule:
    # Run at 04:30 UTC daily (10:00 AM IST)
    - cron: '30 4 * * *'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions tab

jobs:
  reindex:
    name: Run Ingestion and Re-index
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install --with-deps chromium

      - name: Run Ingestion and Re-indexing Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MOCK_EMBEDDINGS: ${{ secrets.MOCK_EMBEDDINGS || 'true' }}
          CHROMA_PERSIST_DIR: ./chroma_db
        run: |
          python run_ingestion.py

      - name: Commit and Push Database Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add chroma_db/
          # Only commit and push if there are modified database files
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update mutual fund database [skip ci]" && git push)
